# Runs the web app's fast, deterministic quality gates on every push/PR to dev or
# main, so a regression is caught in CI instead of on prod. Deliberately does NOT
# run `next build` here — Vercel already builds on the main deploy, and a CI build
# would need the Supabase env — these three gates are secret-free and quick.
name: CI

on:
  push:
    branches: [dev, main]
  pull_request:
    branches: [dev, main]

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install deps
        run: npm ci

      - name: Unit tests
        run: npm test

      - name: Typecheck
        run: npx tsc --noEmit

      - name: Lint
        run: npm run lint
