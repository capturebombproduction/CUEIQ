# Builds the CueIQ desktop app (Electron) for macOS (.dmg) AND Windows (.exe) on
# GitHub's cloud runners — so we can ship a Mac build WITHOUT owning a Mac (macOS
# apps can only be built on macOS; this repo's dev box is Windows-only).
#
# No secrets needed: desktop/vite.config.ts bakes in public Supabase URL + anon key
# + web origin as defaults, so `npm run dist` builds straight through.
#
# How to run:
#   • Actions tab → "Desktop build" → "Run workflow" (manual) → installers land
#     as downloadable run ARTIFACTS only (nothing published), OR
#   • push a tag like `v0.1.1` (git tag v0.1.1 && git push origin v0.1.1) →
#     electron-builder ALSO publishes the WINDOWS installer + `latest.yml` update
#     manifest to a drafted GitHub Release (publish is scoped to `win` in
#     package.json — see below). electron-updater in the packaged Windows app reads
#     that release to auto-update (electron/main.cjs initAutoUpdate). After the
#     tagged run, review the DRAFT release under "Releases" and click Publish —
#     only then do installed Windows apps see it. The MAC .dmg is NOT published (it
#     can't auto-update anyway); grab it from the run's ARTIFACTS.
#   (electron-builder's default publish policy is onTagOrDraft, so a manual
#    dispatch run on a branch never publishes; only a v* tag does.)
#   NOTE: publish is win-only ON PURPOSE — the mac `afterAllArtifactBuild` rename
#   hook (arm64→Apple-Silicon, x64→Intel) collides with electron-builder's publish
#   (it reopens the pre-rename dmg name → ENOENT), so mac publishes nothing.
#
# ⚠️ Unsigned: the .dmg has no Apple Developer cert ($99/yr we don't have), so on
# first open a Mac user must right-click → Open (Gatekeeper). Fine for internal use.
# macOS auto-update is NOT wired (Squirrel.Mac needs a signed app) — Mac users
# re-download the .dmg. Windows auto-update works unsigned.
name: Desktop build

on:
  workflow_dispatch:
  push:
    tags:
      - "v*"

# Let the build-provided GITHUB_TOKEN create/update the GitHub Release on tag runs.
permissions:
  contents: write

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-latest
            label: mac-dmg
          - os: windows-latest
            label: win-exe
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      # Root deps: the desktop renderer reuses the repo-root components/lib via the
      # "@" → repo-root alias, so those packages must resolve during the vite build.
      - name: Install root deps
        run: npm ci

      - name: Install desktop deps
        run: npm ci
        working-directory: desktop

      # vite build + electron-builder. CSC_IDENTITY_AUTO_DISCOVERY=false stops
      # electron-builder from hunting for a (non-existent) macOS signing identity.
      - name: Build installer
        run: npm run dist
        working-directory: desktop
        env:
          CSC_IDENTITY_AUTO_DISCOVERY: false
          # Present so electron-builder can publish to a GitHub Release on a v* tag
          # run (onTagOrDraft). Harmless on dispatch runs — no tag means no publish.
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload installer
        uses: actions/upload-artifact@v4
        with:
          name: CueIQ-${{ matrix.label }}
          path: |
            desktop/release/*.dmg
            desktop/release/*.exe
          if-no-files-found: ignore
