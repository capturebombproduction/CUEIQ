# Builds the CueIQ desktop app (Electron) for macOS (.dmg) AND Windows (.exe) on
# GitHub's cloud runners — so we can ship a Mac build WITHOUT owning a Mac (macOS
# apps can only be built on macOS; this repo's dev box is Windows-only).
#
# No secrets needed: desktop/vite.config.ts bakes in public Supabase URL + anon key
# + web origin as defaults, so `npm run dist` builds straight through.
#
# How to get the installers (BOTH a manual dispatch and a v* tag work the same):
#   Actions tab → this run → scroll to "Artifacts" → download `CueIQ-mac-dmg`
#   (the .dmg, zipped) or `CueIQ-win-exe` (the .exe). That's it — ARTIFACT-ONLY.
#
# We build with `--publish never`: electron-builder's implicit publish-on-tag kept
# breaking (mac: rename-hook vs publish → ENOENT; then a publish-config resolution
# error on both). Auto-update via a published GitHub Release is DEFERRED — the
# electron-updater code in electron/main.cjs stays but is dormant (no release to
# check) until the release pipeline is set up separately and reliably.
#
# ⚠️ Unsigned: the .dmg has no Apple Developer cert, so on first open a Mac user runs
# `xattr -dr com.apple.quarantine /Applications/CueIQ.app`. Fine for internal use.
name: Desktop build

on:
  workflow_dispatch:
  push:
    tags:
      - "v*"

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-latest
            label: mac-dmg
          - os: windows-latest
            label: win-exe
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      # Root deps: the desktop renderer reuses the repo-root components/lib via the
      # "@" → repo-root alias, so those packages must resolve during the vite build.
      - name: Install root deps
        run: npm ci

      - name: Install desktop deps
        run: npm ci
        working-directory: desktop

      # vite build + electron-builder, ARTIFACT-ONLY (--publish never). This is the
      # exact command that builds cleanly locally; plain `npm run dist` on a tag
      # triggers electron-builder's implicit publish, which was failing.
      # CSC_IDENTITY_AUTO_DISCOVERY=false stops it hunting for a macOS signing cert.
      - name: Build installer
        run: npm run dist -- --publish never
        working-directory: desktop
        env:
          CSC_IDENTITY_AUTO_DISCOVERY: false

      - name: Upload installer
        if: always() # upload whatever built even if the other matrix leg failed
        uses: actions/upload-artifact@v4
        with:
          name: CueIQ-${{ matrix.label }}
          path: |
            desktop/release/*.dmg
            desktop/release/*.exe
          if-no-files-found: ignore
