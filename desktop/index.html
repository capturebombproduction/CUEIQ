<!doctype html>
<html lang="th" class="dark">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>CueIQ Desktop</title>
    <script>
      // Pre-paint theme: default dark; only flip to light if the user chose it.
      try {
        if (localStorage.getItem("cueiq:theme") === "light")
          document.documentElement.classList.remove("dark");
      } catch (e) {}
      // Pre-paint accent skin: re-inject the per-device brand color the AccentPicker
      // saved (mirrors app/layout.tsx on web) so the chosen color survives a restart.
      try {
        var a = JSON.parse(localStorage.getItem("cueiq:accent") || "null");
        if (a && a.css) {
          var st = document.createElement("style");
          st.id = "cueiq-skin";
          st.textContent = a.css;
          document.head.appendChild(st);
        }
      } catch (e) {}
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
