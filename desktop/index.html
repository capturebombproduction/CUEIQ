<!doctype html>
<html lang="th" class="dark">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>CueIQ Desktop</title>
    <script>
      // Pre-paint theme: default dark; only flip to light if the user chose it.
      try {
        if (localStorage.getItem("cueiq:theme") === "light")
          document.documentElement.classList.remove("dark");
      } catch (e) {}
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
